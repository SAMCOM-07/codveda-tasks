<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="alert">✅ Form submitted successfully!</div>

    <div class="container">
      <h1>Registration Form</h1>
      <p>Please fill in the form below for complete registration</p>
      <form id="registrationForm">
        <!-- names -->
        <label
          ><span>Full Name *</span>
          <input type="text" id="name" name="name" />
          <span class="error"></span>
        </label>

        <!-- email address -->
        <label
          ><span>Email Address *</span>
          <input type="email" id="email" name="email" />
          <span class="error"></span>
        </label>

        <!-- phone number -->
        <label
          ><span>Phone Number *</span>
          <input type="tel" id="phone" name="phone" maxlength="11" />
          <span class="error"></span>
        </label>

        <!-- password -->
        <label
          ><span>Password *</span>
          <input type="password" id="password" name="password" />
          <div class="passwordStrength">
            <div class="strengthBar"></div>
          </div>
          <span class="strengthText"></span>
          <span class="error"></span>
        </label>

        <!-- comfirm password -->
        <label
          ><span>Confirm Password *</span>
          <input type="password" id="confirmPassword" name="confirmPassword" />
          <span class="error"></span>
        </label>

        <button type="submit">Submit</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
